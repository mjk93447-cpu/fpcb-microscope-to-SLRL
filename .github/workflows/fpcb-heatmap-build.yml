name: Build FPCB Heatmap EXE

on:
  push:
    branches:
      - main
    paths:
      - "fpcb_heatmap_app/**"
      - ".github/workflows/fpcb-heatmap-build.yml"
  workflow_dispatch:

jobs:
  build-fpcb-heatmap:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        working-directory: fpcb_heatmap_app
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest
          pip install pyinstaller

      - name: Run smoke tests
        working-directory: fpcb_heatmap_app
        run: |
          pytest -q

      - name: Build onefile EXE
        working-directory: fpcb_heatmap_app
        run: |
          pyinstaller --noconfirm --onefile --windowed --name fpcb-heatmap-app main.py

      - name: Upload EXE artifact
        uses: actions/upload-artifact@v4
        with:
          name: fpcb-heatmap-app-exe
          path: fpcb_heatmap_app/dist/fpcb-heatmap-app.exe
          if-no-files-found: error

